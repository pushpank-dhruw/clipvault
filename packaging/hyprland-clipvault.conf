# ClipVault Hyprland integration
#
# Add this line to your Hyprland config (~/.config/hypr/hyprland.conf):
#   source = /usr/share/clipvault/hyprland-clipvault.conf
#
# On Omarchy, put the bind in ~/.config/hypr/bindings.conf instead if you
# prefer keeping keybinds in one place.

# Toggle the clipboard shelf
bind = SUPER SHIFT, V, exec, clipvault toggle

# Invisible 2x2 host window (required by the Wayland windowing model:
# eframe's root surface cannot stay unmapped, so it is neutralized here)
windowrule = float on, match:class ^(clipvault)$
windowrule = size 2 2, match:class ^(clipvault)$
windowrule = move 100% 100%, match:class ^(clipvault)$
windowrule = opacity 0, match:class ^(clipvault)$
windowrule = no_focus on, match:class ^(clipvault)$
windowrule = no_shadow on, match:class ^(clipvault)$
windowrule = no_blur on, match:class ^(clipvault)$

# Notch shelf: floating top-center bar. The shelf also drops down when the
# pointer hovers the top-center notch. no_initial_focus keeps a hover-opened
# shelf from stealing keyboard focus; the daemon focuses it only on toggle.
windowrule = float on, match:class ^(clipvault-shelf)$
windowrule = size 820 220, match:class ^(clipvault-shelf)$
windowrule = move 50%-410 8, match:class ^(clipvault-shelf)$
windowrule = no_initial_focus on, match:class ^(clipvault-shelf)$
windowrule = pin on, match:class ^(clipvault-shelf)$
windowrule = rounding 14, match:class ^(clipvault-shelf)$
windowrule = no_shadow on, match:class ^(clipvault-shelf)$
windowrule = no_blur on, match:class ^(clipvault-shelf)$
# Force fully opaque. Some setups (e.g. Omarchy) apply a global default window
# opacity; `override` cancels it so the desktop does not show through the shelf.
windowrule = opacity 1.0 override 1.0 override, match:class ^(clipvault-shelf)$
# Drop the shelf down from the top edge instead of the default scale-from-center.
windowrule = animation slide top, match:class ^(clipvault-shelf)$
