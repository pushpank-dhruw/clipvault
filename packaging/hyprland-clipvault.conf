# ClipVault Hyprland integration
#
# Add this line to your Hyprland config (~/.config/hypr/hyprland.conf):
#   source = /usr/share/clipvault/hyprland-clipvault.conf
#
# On Omarchy, put the bind in ~/.config/hypr/bindings.conf instead if you
# prefer keeping keybinds in one place.

# Launch the Quickshell shelf frontend. The daemon runs separately via its
# systemd user service (`systemctl --user enable --now clipvault`), or is
# auto-started by `clipvault toggle`.
exec-once = qs -c clipvault

# Toggle the shelf. `clipvault toggle` signals the daemon, which pushes a
# toggle event to the running Quickshell frontend (and starts the daemon if it
# is not already running).
bind = SUPER SHIFT, V, exec, clipvault toggle

# The shelf and hover hot-zone are wlr-layer-shell surfaces (namespaces
# `clipvault-shelf` / `clipvault-hotzone`) that place themselves — no rules
# needed. The only toplevel is the Settings dialog (a Quickshell FloatingWindow,
# class `org.quickshell`); float it at a dialog size and keep it opaque.
windowrule = float on, match:class ^(org.quickshell)$
windowrule = size 480 620, match:class ^(org.quickshell)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(org.quickshell)$
